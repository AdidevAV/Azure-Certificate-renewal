name: Deploy Lambda to AWS

on:
  push:
    branches:
      - main
      - develop
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-south-1
  FUNCTION_NAME: certificate-renewal-lambda

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'prod' || (github.ref == 'refs/heads/staging' && 'staging' || 'dev') }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "DEPLOY_ENV=prod" >> $GITHUB_ENV
            echo "STACK_NAME=certificate-renewal-stack-prod" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
            echo "STACK_NAME=certificate-renewal-stack-staging" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=dev" >> $GITHUB_ENV
            echo "STACK_NAME=certificate-renewal-stack-dev" >> $GITHUB_ENV
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt

      - name: Create Deployment Package
        run: |
          mkdir -p lambda-package
          
          # Copy source files
          cp lambda_function.py lambda-package/
          cp config.py lambda-package/
          cp certificate_manager.py lambda-package/
          cp graph_api.py lambda-package/
          cp graph_auth.py lambda-package/
          cp secrets_manager.py lambda-package/
          cp token_generator.py lambda-package/
          
          # Install dependencies to package directory
          pip install -r requirement.txt -t lambda-package --quiet
          
          # Create zip file
          cd lambda-package
          zip -r ../lambda-code.zip . > /dev/null
          cd ..
          
          echo "Deployment package size: $(du -h lambda-code.zip | cut -f1)"

      - name: Upload Code to S3
        run: |
          BUCKET_NAME="${{ env.FUNCTION_NAME }}-deployment-${{ secrets.AWS_ACCOUNT_ID }}"
          aws s3 mb "s3://${BUCKET_NAME}" --region ${{ env.AWS_REGION }} 2>/dev/null || true
          aws s3 cp lambda-code.zip "s3://${BUCKET_NAME}/${{ env.FUNCTION_NAME }}/lambda-code.zip"
          echo "Code uploaded to S3"

      - name: Validate CloudFormation Template
        run: |
          aws cloudformation validate-template \
            --template-body file://template.yaml \
            --region ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation Stack
        run: |
          aws cloudformation deploy \
            --template-file template.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              FunctionName=${{ env.FUNCTION_NAME }} \
              Environment=${{ env.DEPLOY_ENV }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ env.AWS_REGION }} \
            --no-fail-on-empty-changeset

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].Outputs' \
            --output json > outputs.json
          
          cat outputs.json
          
          FUNCTION_ARN=$(jq -r '.[] | select(.OutputKey=="FunctionArn") | .OutputValue' outputs.json)
          echo "function-arn=${FUNCTION_ARN}" >> $GITHUB_OUTPUT

      - name: Run Lambda Test
        run: |
          echo "Waiting for Lambda function to be ready..."
          sleep 5
          
          RESPONSE=$(aws lambda invoke \
            --function-name ${{ env.FUNCTION_NAME }}-${{ env.DEPLOY_ENV }} \
            --region ${{ env.AWS_REGION }} \
            /tmp/response.json \
            --query 'StatusCode' \
            --output text)
          
          if [ "$RESPONSE" == "200" ]; then
            echo "✅ Lambda test passed!"
            cat /tmp/response.json
          else
            echo "❌ Lambda test failed with status: $RESPONSE"
            exit 1
          fi

      - name: Check CloudWatch Logs
        if: success()
        run: |
          echo "Recent log events:"
          aws logs tail "/aws/lambda/${{ env.FUNCTION_NAME }}-${{ env.DEPLOY_ENV }}" \
            --region ${{ env.AWS_REGION }} \
            --since 5m \
            --format short || echo "No logs yet"

      - name: Create Deployment Summary
        if: always()
        run: |
          cat > deployment-summary.md << EOF
          # Deployment Summary
          
          **Environment:** ${{ env.DEPLOY_ENV }}
          **Stack Name:** ${{ env.STACK_NAME }}
          **Region:** ${{ env.AWS_REGION }}
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Workflow:** [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ## Function Details
          - **Function Name:** ${{ env.FUNCTION_NAME }}-${{ env.DEPLOY_ENV }}
          - **Function ARN:** ${{ steps.stack-outputs.outputs.function-arn }}
          - **Runtime:** Python 3.11
          - **Memory:** 256 MB
          - **Timeout:** 300 seconds
          
          ## Scheduled Execution
          - **Schedule:** Daily at 2:00 AM UTC
          - **Logs:** `/aws/lambda/${{ env.FUNCTION_NAME }}-${{ env.DEPLOY_ENV }}`
          
          ## Next Steps
          1. Store Azure Entra secrets:
             \`\`\`bash
             aws secretsmanager create-secret \
               --name ${{ env.FUNCTION_NAME }}/azure \
               --secret-string '{"TENANT_ID":"...","ADMIN_CLIENT_ID":"...","ADMIN_CLIENT_SECRET":"...","TARGET_CLIENT_ID":"..."}' \
               --region ${{ env.AWS_REGION }}
             \`\`\`
          
          2. Monitor function execution in CloudWatch Logs
          
          3. Configure additional alerts if needed
          EOF
          
          cat deployment-summary.md

      - name: Upload Deployment Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-summary-${{ env.DEPLOY_ENV }}
          path: deployment-summary.md
          retention-days: 30

      - name: Notify on Success
        if: success()
        run: |
          echo "✅ Deployment to ${{ env.DEPLOY_ENV }} completed successfully!"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "❌ Deployment to ${{ env.DEPLOY_ENV }} failed!"
          exit 1
