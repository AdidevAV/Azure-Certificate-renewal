name: Validate Lambda Code

on:
  pull_request:
    branches:
      - main
      - develop
      - staging
  push:
    branches:
      - main
      - develop
      - staging

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
          pip install pylint black isort pytest boto3

      - name: Code Format Check (Black)
        run: |
          black --check . --exclude=lambda-package || echo "Run 'black .' to format code"

      - name: Import Sort Check (isort)
        run: |
          isort --check-only . --skip=lambda-package || echo "Run 'isort .' to sort imports"

      - name: Lint Check (Pylint)
        run: |
          pylint *.py --disable=C0111,W0212 --fail-under=7.0 || true

      - name: Syntax Validation
        run: |
          python -m py_compile lambda_function.py
          python -m py_compile config.py
          python -m py_compile certificate_manager.py
          python -m py_compile graph_api.py
          python -m py_compile graph_auth.py
          python -m py_compile secrets_manager.py
          python -m py_compile token_generator.py
          echo "✅ All files have valid Python syntax"

      - name: Check CloudFormation Template
        run: |
          pip install cfn-lint
          cfn-lint template.yaml

      - name: Check Requirements File
        run: |
          pip install safety
          safety check --file requirement.txt || echo "⚠️ Security check complete"

      - name: Create Deployment Package (Test)
        run: |
          mkdir -p lambda-package
          
          cp lambda_function.py lambda-package/
          cp config.py lambda-package/
          cp certificate_manager.py lambda-package/
          cp graph_api.py lambda-package/
          cp graph_auth.py lambda-package/
          cp secrets_manager.py lambda-package/
          cp token_generator.py lambda-package/
          
          pip install -r requirement.txt -t lambda-package --quiet
          
          cd lambda-package
          zip -r ../lambda-code.zip . > /dev/null
          cd ..
          
          PACKAGE_SIZE=$(du -h lambda-code.zip | cut -f1)
          echo "✅ Package created successfully: $PACKAGE_SIZE"

      - name: Summary
        run: |
          echo "Code validation completed successfully!"
          echo "✅ Python syntax valid"
          echo "✅ CloudFormation template valid"
          echo "✅ Deployment package created"
